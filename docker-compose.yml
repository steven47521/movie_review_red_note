services:
  mysql:
    image: mysql:8.0
    container_name: rednote-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: rednote
      MYSQL_USER: rednote
      MYSQL_PASSWORD: rednote
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  backend:
    build:
      context: ./backend
    container_name: rednote-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: mysql+pymysql://rednote:rednote@mysql:3306/rednote
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TMDB_API_KEY: ${TMDB_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      API_SECRET_KEY: ${API_SECRET_KEY:-dev_secret}
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: rednote-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mysql_data:
