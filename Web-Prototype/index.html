<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>片语 RedNote 工作台</title>
  <style>
    :root {
      --bg: #fafafa;
      --surface: #ffffff;
      --surface-warm: var(--surface);
      --fg: #111111;
      --fg-2: var(--fg);
      --muted: #6b6b6b;
      --meta: var(--muted);
      --border: #e5e5e5;
      --border-soft: var(--border);
      --accent: #2f6feb;
      --accent-on: #ffffff;
      --accent-hover: color-mix(in oklab, var(--accent), black 8%);
      --accent-active: color-mix(in oklab, var(--accent), black 14%);
      --success: #17a34a;
      --warn: #eab308;
      --danger: #dc2626;
      --font-display: "Inter", -apple-system, system-ui, sans-serif;
      --font-body: "Inter", -apple-system, system-ui, sans-serif;
      --font-mono: ui-monospace, "JetBrains Mono", monospace;
      --text-xs: 12px;
      --text-sm: 14px;
      --text-base: 16px;
      --text-lg: 20px;
      --text-xl: 24px;
      --text-2xl: 32px;
      --text-3xl: 48px;
      --text-4xl: 64px;
      --leading-body: 1.5;
      --leading-tight: 1.2;
      --tracking-display: -0.01em;
      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-8: 32px;
      --space-12: 48px;
      --space-20: 80px;
      --section-y-desktop: 80px;
      --section-y-tablet: 48px;
      --section-y-phone: 32px;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-pill: 9999px;
      --elev-flat: none;
      --elev-ring: 0 0 0 1px var(--border);
      --elev-raised: 0 2px 8px color-mix(in oklab, var(--fg), transparent 92%);
      --focus-ring: 0 0 0 3px color-mix(in oklab, var(--accent), transparent 70%);
      --motion-fast: 150ms;
      --motion-base: 200ms;
      --ease-standard: cubic-bezier(0.2, 0, 0, 1);
      --container-max: 1200px;
      --container-gutter-desktop: 24px;
      --container-gutter-tablet: 16px;
      --container-gutter-phone: 12px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-body);
      font-size: var(--text-base);
      line-height: var(--leading-body);
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    body[data-left-open="true"],
    body[data-right-open="true"] {
      overflow: hidden;
    }

    img,
    svg {
      display: block;
      max-width: 100%;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      background: transparent;
      cursor: pointer;
      color: inherit;
    }

    textarea {
      resize: none;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    h1,
    h2,
    h3,
    h4 {
      margin: 0;
      font-family: var(--font-display);
      font-weight: 600;
      line-height: var(--leading-tight);
      letter-spacing: var(--tracking-display);
      text-wrap: balance;
    }

    p {
      margin: 0;
      text-wrap: pretty;
    }

    :focus-visible {
      outline: none;
      box-shadow: var(--focus-ring);
    }

    .num {
      font-family: var(--font-mono);
      font-variant-numeric: tabular-nums;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      margin: -1px;
      padding: 0;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .app-shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topnav {
      position: sticky;
      top: 0;
      z-index: 40;
      border-bottom: 1px solid var(--border);
      background: color-mix(in oklab, var(--bg), var(--surface) 42%);
      backdrop-filter: blur(14px);
    }

    .topnav-inner {
      width: min(calc(100% - (var(--space-6) * 2)), 1500px);
      margin: 0 auto;
      min-height: 72px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: var(--space-4);
    }

    .brand-lockup {
      display: flex;
      flex-direction: column;
      gap: var(--space-1);
      min-width: 0;
    }

    .brand-title {
      font-size: var(--text-lg);
      font-weight: 600;
      letter-spacing: var(--tracking-display);
    }

    .brand-meta {
      color: var(--muted);
      font-size: var(--text-sm);
    }

    .workspace-summary {
      display: flex;
      justify-content: center;
      gap: var(--space-3);
      flex-wrap: wrap;
      color: var(--muted);
      font-size: var(--text-sm);
    }

    .meta-pill,
    .ghost-pill {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      min-height: 32px;
      padding: 0 var(--space-3);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      background: var(--surface);
      color: var(--fg);
      white-space: nowrap;
    }

    .meta-pill {
      font-size: var(--text-sm);
    }

    .ghost-pill {
      color: var(--muted);
      transition:
        border-color var(--motion-fast) var(--ease-standard),
        color var(--motion-fast) var(--ease-standard),
        background var(--motion-fast) var(--ease-standard);
    }

    .ghost-pill:hover {
      color: var(--fg);
      border-color: var(--fg);
    }

    .topnav-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: var(--space-3);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      min-height: 40px;
      padding: 0 var(--space-4);
      border-radius: var(--radius-sm);
      border: 1px solid transparent;
      transition:
        background var(--motion-fast) var(--ease-standard),
        border-color var(--motion-fast) var(--ease-standard),
        color var(--motion-fast) var(--ease-standard),
        transform var(--motion-fast) var(--ease-standard);
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn-primary {
      background: var(--accent);
      color: var(--accent-on);
    }

    .btn-primary:hover {
      background: var(--accent-hover);
    }

    .btn-secondary {
      background: var(--surface);
      border-color: var(--border);
      color: var(--fg);
    }

    .btn-secondary:hover {
      border-color: var(--fg);
    }

    .btn-ghost {
      color: var(--muted);
      padding-inline: var(--space-3);
    }

    .btn-ghost:hover {
      color: var(--fg);
      background: color-mix(in oklab, var(--fg), transparent 96%);
    }

    .btn-small {
      min-height: 32px;
      padding-inline: var(--space-3);
      font-size: var(--text-sm);
    }

    .mobile-toggle {
      display: none;
    }

    .workspace {
      flex: 1;
      padding: var(--space-4);
    }

    .workspace-grid {
      width: min(100%, 1520px);
      margin: 0 auto;
      min-height: calc(100vh - 104px);
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr) 340px;
      gap: var(--space-4);
      align-items: stretch;
    }

    .panel {
      min-height: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      box-shadow: var(--elev-flat);
    }

    .left-rail,
    .center-stage,
    .right-rail {
      overflow: hidden;
    }

    .left-rail,
    .right-rail {
      display: flex;
      flex-direction: column;
    }

    .center-stage {
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto;
    }

    .panel-head {
      padding: var(--space-5);
      border-bottom: 1px solid var(--border);
    }

    .sidebar-headline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      margin-bottom: var(--space-4);
    }

    .sidebar-headline h2,
    .stage-head h1,
    .tabs-bar h2 {
      font-size: var(--text-xl);
    }

    .sidebar-note,
    .caption,
    .small-copy {
      color: var(--muted);
      font-size: var(--text-sm);
    }

    .rail-stack {
      padding: var(--space-4);
      display: flex;
      flex-direction: column;
      gap: var(--space-4);
      overflow-y: auto;
    }

    .filter-row,
    .quick-row,
    .tag-row,
    .stage-tags {
      display: flex;
      gap: var(--space-2);
      flex-wrap: wrap;
    }

    .filter-chip {
      min-height: 32px;
      padding: 0 var(--space-3);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      color: var(--muted);
      background: color-mix(in oklab, var(--bg), var(--surface) 35%);
      transition:
        border-color var(--motion-fast) var(--ease-standard),
        color var(--motion-fast) var(--ease-standard),
        background var(--motion-fast) var(--ease-standard);
    }

    .filter-chip:hover,
    .filter-chip[aria-pressed="true"] {
      color: var(--fg);
      border-color: var(--fg);
      background: var(--surface);
    }

    .thread-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }

    .thread-card {
      width: 100%;
      padding: var(--space-4);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: color-mix(in oklab, var(--surface), var(--bg) 22%);
      text-align: left;
      transition:
        border-color var(--motion-fast) var(--ease-standard),
        background var(--motion-fast) var(--ease-standard),
        transform var(--motion-fast) var(--ease-standard);
    }

    .thread-card:hover {
      border-color: var(--fg);
      transform: translateY(-1px);
    }

    .thread-card.is-active {
      background: var(--surface);
      border-color: var(--fg);
      box-shadow: var(--elev-ring);
    }

    .thread-card-top,
    .thread-card-bottom {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--space-3);
    }

    .thread-card-title {
      font-size: var(--text-base);
      font-weight: 600;
      letter-spacing: var(--tracking-display);
    }

    .thread-card-subtitle {
      margin-top: var(--space-1);
      color: var(--muted);
      font-size: var(--text-sm);
    }

    .thread-card-snippet {
      margin-top: var(--space-3);
      color: var(--fg);
      font-size: var(--text-sm);
      line-height: 1.55;
    }

    .thread-card-bottom {
      margin-top: var(--space-4);
      align-items: center;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      min-height: 28px;
      padding: 0 var(--space-3);
      border-radius: var(--radius-pill);
      font-size: var(--text-xs);
      font-weight: 600;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .status-pill.is-success {
      background: color-mix(in oklab, var(--success), transparent 88%);
      color: var(--success);
    }

    .status-pill.is-warn {
      background: color-mix(in oklab, var(--warn), transparent 86%);
      color: color-mix(in oklab, var(--fg), var(--warn) 35%);
    }

    .status-pill.is-danger {
      background: color-mix(in oklab, var(--danger), transparent 88%);
      color: var(--danger);
    }

    .status-pill.is-neutral {
      background: color-mix(in oklab, var(--fg), transparent 94%);
      color: var(--fg);
    }

    .status-pill.is-muted {
      background: color-mix(in oklab, var(--muted), transparent 92%);
      color: var(--muted);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: currentColor;
    }

    .sidebar-library {
      border-top: 1px solid var(--border);
      padding-top: var(--space-4);
      display: grid;
      gap: var(--space-3);
    }

    .library-row {
      display: flex;
      justify-content: space-between;
      gap: var(--space-4);
      align-items: center;
      color: var(--muted);
      font-size: var(--text-sm);
    }

    .library-row strong {
      color: var(--fg);
      font-weight: 600;
    }

    .stage-head {
      padding: var(--space-5);
      border-bottom: 1px solid var(--border);
      display: grid;
      gap: var(--space-4);
    }

    .stage-title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--space-4);
    }

    .stage-headline {
      display: grid;
      gap: var(--space-3);
    }

    .stage-head h1 {
      font-size: var(--text-2xl);
      max-width: 18ch;
    }

    .stage-summary {
      color: var(--muted);
      max-width: 64ch;
    }

    .stage-progress {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: var(--space-2);
    }

    .stage-step {
      display: grid;
      gap: var(--space-2);
      padding: var(--space-3);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: color-mix(in oklab, var(--surface), var(--bg) 18%);
    }

    .stage-step.is-current {
      border-color: var(--fg);
      background: var(--surface);
    }

    .stage-step.is-done {
      border-color: color-mix(in oklab, var(--success), transparent 70%);
      background: color-mix(in oklab, var(--success), transparent 92%);
    }

    .stage-step-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      color: var(--muted);
      font-size: var(--text-xs);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .stage-step strong {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--fg);
      text-transform: none;
      letter-spacing: 0;
    }

    .stage-step small {
      color: var(--muted);
      font-size: var(--text-xs);
    }

    .draft-snapshot {
      padding: var(--space-4) var(--space-5);
      border-bottom: 1px solid var(--border);
      display: grid;
      gap: var(--space-4);
      background: color-mix(in oklab, var(--surface), var(--bg) 14%);
    }

    .snapshot-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: var(--space-3);
      flex-wrap: wrap;
    }

    .snapshot-body {
      display: grid;
      grid-template-columns: minmax(0, 1.35fr) minmax(0, 1fr);
      gap: var(--space-4);
    }

    .snapshot-card {
      padding: var(--space-4);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--surface);
      display: grid;
      gap: var(--space-3);
    }

    .snapshot-title {
      font-size: var(--text-lg);
    }

    .hook-list,
    .bullet-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: var(--space-2);
    }

    .hook-list li,
    .bullet-list li {
      position: relative;
      padding-left: var(--space-4);
      color: var(--fg);
      font-size: var(--text-sm);
    }

    .hook-list li::before,
    .bullet-list li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0.7em;
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--fg);
      transform: translateY(-50%);
    }

    .draft-excerpt {
      color: var(--muted);
      font-size: var(--text-sm);
      max-height: 6.2em;
      overflow: hidden;
    }

    .chat-scroll {
      overflow-y: auto;
      padding: var(--space-5);
      display: grid;
      gap: var(--space-4);
      background: color-mix(in oklab, var(--surface), var(--bg) 16%);
    }

    .message {
      display: grid;
      grid-template-columns: 40px minmax(0, 1fr);
      gap: var(--space-3);
      align-items: flex-start;
    }

    .message-avatar {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: color-mix(in oklab, var(--surface), var(--bg) 24%);
      display: grid;
      place-items: center;
      font-size: var(--text-xs);
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--fg);
    }

    .message-card {
      display: grid;
      gap: var(--space-3);
      padding: var(--space-4);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--surface);
    }

    .message-card.is-system {
      background: color-mix(in oklab, var(--fg), transparent 96%);
    }

    .message-card.is-reviewer {
      background: color-mix(in oklab, var(--surface), var(--bg) 14%);
    }

    .message-card.is-writer {
      border-color: color-mix(in oklab, var(--fg), transparent 78%);
    }

    .message-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      flex-wrap: wrap;
    }

    .message-author {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-size: var(--text-sm);
      font-weight: 600;
    }

    .role-chip {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 var(--space-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      color: var(--muted);
      font-size: var(--text-xs);
      font-family: var(--font-mono);
      letter-spacing: 0.04em;
    }

    .message-copy {
      font-size: var(--text-sm);
      color: var(--fg);
      white-space: pre-line;
    }

    .message-attachment {
      padding: var(--space-4);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: color-mix(in oklab, var(--surface), var(--bg) 20%);
      display: grid;
      gap: var(--space-3);
    }

    .attachment-title {
      font-size: var(--text-base);
      font-weight: 600;
      letter-spacing: var(--tracking-display);
    }

    .attachment-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: var(--space-3);
    }

    .attachment-cell {
      padding: var(--space-3);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      display: grid;
      gap: var(--space-2);
    }

    .attachment-cell strong {
      font-size: var(--text-sm);
      font-weight: 600;
    }

    .composer {
      padding: var(--space-4) var(--space-5) var(--space-5);
      border-top: 1px solid var(--border);
      display: grid;
      gap: var(--space-3);
      background: var(--surface);
    }

    .composer-box {
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: color-mix(in oklab, var(--surface), var(--bg) 12%);
      padding: var(--space-3);
      display: grid;
      gap: var(--space-3);
    }

    .composer textarea {
      width: 100%;
      min-height: 88px;
      border: 0;
      background: transparent;
      color: var(--fg);
      font-size: var(--text-base);
      line-height: var(--leading-body);
      outline: 0;
    }

    .composer textarea::placeholder {
      color: var(--muted);
    }

    .composer-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: var(--space-3);
      flex-wrap: wrap;
    }

    .quick-action {
      min-height: 32px;
      padding: 0 var(--space-3);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      background: var(--surface);
      color: var(--fg);
      font-size: var(--text-sm);
      transition:
        border-color var(--motion-fast) var(--ease-standard),
        color var(--motion-fast) var(--ease-standard);
    }

    .quick-action:hover {
      border-color: var(--fg);
    }

    .composer-meta {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      color: var(--muted);
      font-size: var(--text-sm);
    }

    .tabs-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      padding: var(--space-5);
      border-bottom: 1px solid var(--border);
    }

    .tabs-nav {
      display: flex;
      gap: var(--space-2);
      flex-wrap: wrap;
    }

    .tab-btn {
      min-height: 36px;
      padding: 0 var(--space-3);
      border-radius: var(--radius-pill);
      border: 1px solid var(--border);
      background: color-mix(in oklab, var(--surface), var(--bg) 12%);
      color: var(--muted);
      transition:
        border-color var(--motion-fast) var(--ease-standard),
        color var(--motion-fast) var(--ease-standard),
        background var(--motion-fast) var(--ease-standard);
    }

    .tab-btn:hover,
    .tab-btn[aria-selected="true"] {
      border-color: var(--fg);
      background: var(--surface);
      color: var(--fg);
    }

    .tabs-content {
      flex: 1;
      overflow-y: auto;
      padding: var(--space-5);
      display: grid;

    const state = {
      filter: "all",
      activeSessionId: localStorage.getItem("rednote-active-session") || sessions[0].id,
      activeTab: localStorage.getItem("rednote-active-tab") || "review",
      selectedVersionId: localStorage.getItem("rednote-selected-version") || sessions[0].currentVersionId
    };

    const sessionListEl = document.getElementById("sessionList");
    const stageTagsEl = document.getElementById("stageTags");
    const sessionTitleEl = document.getElementById("sessionTitle");
    const sessionSummaryEl = document.getElementById("sessionSummary");
    const stageProgressEl = document.getElementById("stageProgress");
    const draftSnapshotEl = document.getElementById("draftSnapshot");
    const chatStreamEl = document.getElementById("chatStream");
    const sidePanelEl = document.getElementById("sidePanel");
    const tabNavEl = document.getElementById("tabNav");
    const promptInputEl = document.getElementById("promptInput");
    const composerFormEl = document.getElementById("composerForm");
    const primaryActionEl = document.getElementById("primaryAction");
    const filterRowEl = document.getElementById("filterRow");
    const toastEl = document.getElementById("toast");
    const scrimEl = document.getElementById("scrim");

    let toastTimer = null;

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function getActiveSession() {
      return sessions.find((session) => session.id === state.activeSessionId) || sessions[0];
    }

    function getStatusClass(status) {
      if (status === "success") return "is-success";
      if (status === "warn") return "is-warn";
      if (status === "danger") return "is-danger";
      if (status === "neutral") return "is-neutral";
      return "is-muted";
    }

    function renderFilters() {
      filterRowEl.querySelectorAll("[data-filter]").forEach((button) => {
        button.setAttribute("aria-pressed", String(button.dataset.filter === state.filter));
      });
    }

    function renderSessionList() {
      const filtered = sessions.filter((session) => {
        if (state.filter === "all") return true;
        if (state.filter === "text") return session.stageIndex === 3;
        if (state.filter === "image") return session.stageIndex === 4;
        if (state.filter === "done") return session.stageLabel === "已完成";
        return true;
      });

      sessionListEl.innerHTML = filtered
        .map((session) => {
          const isActive = session.id === state.activeSessionId;
          return `
            <button class="thread-card ${isActive ? "is-active" : ""}" type="button" data-session-id="${session.id}">
              <div class="thread-card-top">
                <div>
                  <div class="thread-card-title">${escapeHtml(session.title)}</div>
                  <div class="thread-card-subtitle">${escapeHtml(session.updatedAt)}</div>
                </div>
                <span class="status-pill ${getStatusClass(session.stageStatus)}">
                  <span class="status-dot"></span>${escapeHtml(session.stageLabel)}
                </span>
              </div>
              <p class="thread-card-snippet">${escapeHtml(session.overview)}</p>
              <div class="thread-card-bottom">
                <div class="tag-row">
                  ${session.tags.slice(0, 2).map((tag) => `<span class="role-chip">${escapeHtml(tag)}</span>`).join("")}
                </div>
                <span class="small-copy">第 <span class="num">${session.rounds.text}</span> 轮文案</span>
              </div>
            </button>
          `;
        })
        .join("");
    }

    function renderStageHeader(session) {
      stageTagsEl.innerHTML = `
        <span class="status-pill ${getStatusClass(session.stageStatus)}"><span class="status-dot"></span>${escapeHtml(session.stageLabel)}</span>
        <span class="role-chip">当前路线：${escapeHtml(session.tags[2] || session.tags[0])}</span>
        <span class="role-chip">文案轮次 <span class="num">${session.rounds.text}</span>/5</span>
      `;
      sessionTitleEl.textContent = session.title;
      sessionSummaryEl.textContent = session.summary;
      primaryActionEl.textContent = session.primaryAction;
    }

    function renderProgress(session) {
      stageProgressEl.innerHTML = stageOrder
        .map((stage, index) => {
          let className = "";
          if (index < session.stageIndex) className = "is-done";
          if (index === session.stageIndex) className = "is-current";
          const meta = index === 3
            ? `第 ${session.rounds.text} 轮 / 最高 5 轮`
            : index === 4
              ? `第 ${session.rounds.image} 轮`
              : stage.hint;
          return `
            <div class="stage-step ${className}">
              <div class="stage-step-top">
                <span>${String(index + 1).padStart(2, "0")}</span>
                <span>${index < session.stageIndex ? "已完成" : index === session.stageIndex ? "进行中" : "待开始"}</span>
              </div>
              <strong>${stage.label}</strong>
              <small>${escapeHtml(meta)}</small>
            </div>
          `;
        })
        .join("");
    }

    function renderSnapshot(session) {
      const version = session.versions.find((item) => item.id === state.selectedVersionId) || session.versions[0];
      draftSnapshotEl.innerHTML = `
        <div class="snapshot-top">
          <div>
            <div class="small-copy">当前展示</div>
            <strong class="snapshot-title">${escapeHtml(version.title)}</strong>

            <span class="role-chip">${escapeHtml(version.status)}</span>
            <button class="btn btn-secondary btn-small" type="button" data-action="copy-title">复制标题</button>
          </div>
        </div>
        <div class="snapshot-body">

            <div class="small-copy">当前引子</div>

            <p class="draft-excerpt">${escapeHtml(version.excerpt)}</p>

              ${version.tags.map((tag) => `<span class="role-chip">${escapeHtml(tag)}</span>`).join("")}
            </div>
          </div>
        </div>
      `;
    }

    function renderMessages(session) {
      chatStreamEl.innerHTML = session.messages
        .map((message) => {
          const variantClass = `is-${message.role === "moderator" ? "system" : message.role}`;
          return `
            <article class="message">
              <div class="message-avatar">${escapeHtml(message.avatar)}</div>
              <div class="message-card ${variantClass}">
                <div class="message-head">
                  <div class="message-author">
                    <span>${escapeHtml(message.author)}</span>
                    <span class="role-chip">${escapeHtml(message.badge)}</span>
                  </div>
                  <span class="small-copy num">${escapeHtml(message.time)}</span>
                </div>
                <p class="message-copy">${escapeHtml(message.copy)}</p>
                ${message.attachment ? `
                  <div class="message-attachment">
                    <strong class="attachment-title">${escapeHtml(message.attachment.title)}</strong>
                    <div class="attachment-grid">
                      ${message.attachment.cells.map((cell) => `
                        <div class="attachment-cell">
                          <span class="small-copy">${escapeHtml(cell.label)}</span>
                          <strong>${escapeHtml(cell.value)}</strong>
                        </div>
                      `).join("")}
                    </div>
                  </div>
                ` : ""}
              </div>
            </article>
          `;
        })
        .join("");
    }

    function renderReviewTab(session) {
      return `
        <section class="inspector-card">
          <h3>当前评审团</h3>
          <p class="caption">这组人格会按网感、结构和情绪三个维度给出意见，避免只得到同一种审稿声音。</p>
        </section>
        <div class="reviewer-grid">
          ${session.reviewers.map((reviewer) => `

              <p class="caption">${escapeHtml(reviewer.tone)}</p>

      `;

    function renderProgressTab(session) {
      return `
        <section class="inspector-card">
          <h3>当前进度</h3>
          <ul class="progress-list">
            ${stageOrder.map((stage, index) => `
              <li class="progress-row">
                <div class="progress-title">
                  <span>${escapeHtml(stage.label)}</span>
                  <span class="status-pill ${index < session.stageIndex ? "is-success" : index === session.stageIndex ? getStatusClass(session.stageStatus) : "is-muted"}">
                    <span class="status-dot"></span>
                    ${index < session.stageIndex ? "完成" : index === session.stageIndex ? "进行中" : "待开始"}
                  </span>
                </div>
                <p class="progress-copy">${escapeHtml(index === 3 ? `文案评审进行到第 ${session.rounds.text} 轮。` : index === 4 ? `配图审稿轮次：${session.rounds.image}。` : stage.hint)}</p>
              </li>
            `).join("")}
          </ul>
        </section>
        <section class="inspector-card">
          <h3>审计记录</h3>
          <ul class="audit-list">
            ${session.audit.map((item) => `
              <li class="audit-row">
                <div class="audit-head">
                  <span>${escapeHtml(item.stage)}</span>
                  <span class="num">${escapeHtml(item.time)}</span>
                </div>
                <p class="audit-copy">${escapeHtml(item.detail)}</p>
              </li>
            `).join("")}
          </ul>
        </section>
      `;
    }

    function renderVersionsTab(session) {
      const version = session.versions.find((item) => item.id === state.selectedVersionId) || session.versions[0];
      return `
        <section class="inspector-card">
          <h3>历史记录</h3>
          <p class="caption">每一版标题、引子和摘要都会被完整保存，可以随时回看、对比与回滚。</p>
        </section>
        <div class="version-list">
          ${session.versions.map((item) => `
            <button class="version-row" type="button" data-version-id="${item.id}" aria-current="${String(item.id === version.id)}">
              <div class="version-row-top">
                <div>
                  <div class="version-title">${escapeHtml(item.label)} · ${escapeHtml(item.status)}</div>
                  <div class="small-copy">${escapeHtml(item.title)}</div>
                </div>
                <span class="role-chip">${escapeHtml(item.tags[0] || "稿件")}</span>
              </div>
              <p class="version-excerpt">${escapeHtml(item.excerpt)}</p>
            </button>
          `).join("")}
        </div>
        <section class="inspector-card">
          <h3>当前选中版本</h3>
          <ul class="bullet-list">
            ${version.hooks.map((hook) => `<li>${escapeHtml(hook)}</li>`).join("")}
          </ul>
        </section>
      `;
    }

    function renderAssetsTab(session) {
      return `
        <section class="inspector-card">
          <h3>产物与配图</h3>
          <p class="caption">这里固定展示封面、金句卡与氛围图，避免创作完成后再切去另一套界面找产物。</p>
        </section>
        <div class="asset-grid">
          ${session.assets.map((asset) => `
            <article class="reviewer-row">
              <div class="asset-head">
                <div class="reviewer-id">
                  <strong>${escapeHtml(asset.type)}</strong>
                  <span>${escapeHtml(asset.status)}</span>
                </div>
                <button class="btn btn-secondary btn-small" type="button" data-action="open-tab" data-tab="progress">看流程</button>
              </div>
              <div class="artifact-shot">${escapeHtml(asset.placeholder)}</div>
              <p class="reviewer-note">${escapeHtml(asset.note)}</p>
            </article>
          `).join("")}
        </div>
      `;
    }

    function renderSidePanel(session) {
      tabNavEl.querySelectorAll("[data-tab]").forEach((button) => {
        button.setAttribute("aria-selected", String(button.dataset.tab === state.activeTab));
      });

      if (state.activeTab === "progress") {
        sidePanelEl.innerHTML = renderProgressTab(session);
        return;
      }
      if (state.activeTab === "versions") {
        sidePanelEl.innerHTML = renderVersionsTab(session);
        return;
      }
      if (state.activeTab === "assets") {
        sidePanelEl.innerHTML = renderAssetsTab(session);
        return;
      }
      sidePanelEl.innerHTML = renderReviewTab(session);
    }

    function render() {
      const session = getActiveSession();
      if (!session.versions.some((item) => item.id === state.selectedVersionId)) {
        state.selectedVersionId = session.currentVersionId;
      }
      renderFilters();
      renderSessionList();
      renderStageHeader(session);
      renderProgress(session);
      renderSnapshot(session);
      renderMessages(session);
      renderSidePanel(session);
      localStorage.setItem("rednote-active-session", session.id);
      localStorage.setItem("rednote-active-tab", state.activeTab);
      localStorage.setItem("rednote-selected-version", state.selectedVersionId);
    }

    function openRightPanel(tab) {
      state.activeTab = tab;
      document.body.dataset.leftOpen = "false";
      if (window.matchMedia("(max-width: 1080px)").matches) {
        document.body.dataset.rightOpen = "true";
      }
      render();
    }

    function closeDrawers() {
      document.body.dataset.leftOpen = "false";
      document.body.dataset.rightOpen = "false";
    }

    function showToast(message) {
      toastEl.textContent = message;
      toastEl.classList.add("is-visible");
      window.clearTimeout(toastTimer);
      toastTimer = window.setTimeout(() => {
        toastEl.classList.remove("is-visible");
      }, 2200);
    }

    function appendMessage(session, message) {
      session.messages.push(message);
      session.updatedAt = "刚刚";
      render();
      requestAnimationFrame(() => {
        chatStreamEl.scrollTo({ top: chatStreamEl.scrollHeight, behavior: "smooth" });
      });
    }

    function runPrimaryAction() {
      const session = getActiveSession();
      if (session.stageIndex === 3) {
        session.rounds.text = Math.min(session.rounds.text + 1, 5);
        session.audit.unshift({
          stage: `第 ${session.rounds.text} 轮评审开始`,
          time: "刚刚",
          detail: "已从主界面直接续接评审，不用离开当前会话。"
        });
        appendMessage(session, {
          id: `auto-${Date.now()}`,
          role: "system",
          author: "系统",
          badge: "轮次",
          time: "刚刚",
          avatar: "SYS",
          copy: `已发起第 ${session.rounds.text} 轮文案评审，右侧会持续同步新的意见摘要。`
        });
        openRightPanel("progress");
        showToast("已续接新一轮文案评审");
        return;
      }

      if (session.stageIndex === 4) {
        session.rounds.image += 1;
        session.audit.unshift({
          stage: `第 ${session.rounds.image} 轮配图评审开始`,
          time: "刚刚",
          detail: "新一轮配图审稿已加入时间线。"
        });
        openRightPanel("assets");
        showToast("已发起新一轮配图评审");
        render();
        return;
      }

      showToast("已创建下一步任务，等待生成结果。");
    }

    function queueWriterRevision(session, prompt) {
      const lowerPrompt = prompt.toLowerCase();
      const currentVersion = session.versions[0];
      let nextTitle = currentVersion.title;
      let nextHooks = [...currentVersion.hooks];
      let nextExcerpt = currentVersion.excerpt;
      let reply = "已记录这条改稿指令，我会把它写进下一版，并同步给评审团继续看。";

      if (lowerPrompt.includes("标题")) {
        if (session.id === "mood-for-love") {
          nextTitle = "为什么《花样年华》最让人难受的，不是错过，而是每一次都没来得及把话说完";
          nextHooks = [
            "它最痛的地方，从来不是爱而不得，而是每一次都差一点点就能说出口。",
            "这部电影把“想靠近又不敢靠近”的气压，拍成了一整条走不出去的走廊。"
          ];
          nextExcerpt = "新版把论点更早抛出：先讲空间如何泄密，再把人物关系放回来承接情绪。";
        } else if (session.id === "legend-1900") {
          nextTitle = "《海上钢琴师》真正让人舍不得的，不是天才，而是他从头到尾都拒绝被世界定义";
          nextHooks = [
            "1900 留在船上，不只是因为害怕上岸，而是因为他根本不愿进入那个被编号的人生。",
            "这不是传奇滤镜，而是一种对现实秩序的彻底拒绝。"
          ];
          nextExcerpt = "这一版把“拒绝被世界定义”提到标题前景，减少人物传奇的叙述比例。";
        } else {
          nextTitle = "《牯岭街少年杀人事件》最让人后劲发作的，不是结局，而是所有裂缝都早就写在前面";
          nextHooks = [
            "真正让人不安的不是那一刻的失控，而是整个时代一点点把少年推到边缘。",
            "你看到的不是孤立事件，而是一整套失去彼此的过程。"
          ];
          nextExcerpt = "标题被收得更集中，强调“裂缝早已存在”的主题，方便后续和配图统一气质。";
        }
        reply = "标题方向已收得更像可点击的深度笔记，保留高级感，但把第一击的情绪强度再往前提了一格。";
      } else if (lowerPrompt.includes("配图")) {
        state.activeTab = "assets";
        reply = session.id === "brighter-summer"
          ? "已经把这一轮配图重点收敛到字重、留白和图文关系上，右侧产物区会直接显示三张图的当前状态。"
          : "已经整理成三张配图方向：封面负责建立气压，金句卡负责二次传播，氛围图负责延长停留。";
      } else if (lowerPrompt.includes("评审")) {
        state.activeTab = "review";
        reply = session.id === "legend-1900"
          ? "已把路线确认稿送入评审团，优先听他们对“不上岸”的主题切口是否成立。"
          : "已把这一版继续送入评审团，优先收集对标题、引子和结尾留白的意见。";
      }

      window.setTimeout(() => {
        const newVersionIndex = session.versions.length + 1;
        const newVersionId = `v${newVersionIndex + 1}`;
        const newest = {
          id: newVersionId,
          label: `v${newVersionIndex + 1}`,
          status: "新生成",
          title: nextTitle,
          hooks: nextHooks,
          excerpt: nextExcerpt,
          tags: currentVersion.tags
        };
        session.versions.unshift(newest);
        session.currentVersionId = newVersionId;
        state.selectedVersionId = newVersionId;
        session.audit.unshift({
          stage: `${newest.label} 已写入`,
          time: "刚刚",
          detail: reply
        });
        appendMessage(session, {
          id: `writer-${Date.now()}`,
          role: "writer",
          author: "写作助手",
          badge: "回写",
          time: "刚刚",
          avatar: "WRT",
          copy: reply,
          attachment: {
            title: `${newest.label} 当前变化`,
            cells: [
              { label: "标题", value: newest.title },
              { label: "重点", value: lowerPrompt.includes("配图") ? "已切换到配图侧栏" : "标题与引子已同步更新" }
            ]
          }
        });
      }, 700);
    }

    filterRowEl.addEventListener("click", (event) => {
      const button = event.target.closest("[data-filter]");
      if (!button) return;
      state.filter = button.dataset.filter;
      render();
    });

    sessionListEl.addEventListener("click", (event) => {
      const button = event.target.closest("[data-session-id]");
      if (!button) return;
      state.activeSessionId = button.dataset.sessionId;
      state.selectedVersionId = getActiveSession().currentVersionId;
      closeDrawers();
      render();
    });

    document.addEventListener("click", (event) => {
      const actionTrigger = event.target.closest("[data-action]");
        if (actionTrigger) {
        const action = actionTrigger.dataset.action;
        if (action === "toggle-left") {
          const willOpen = document.body.dataset.leftOpen !== "true";
          document.body.dataset.leftOpen = willOpen ? "true" : "false";
          document.body.dataset.rightOpen = "false";
        }
        if (action === "toggle-right") {
          const willOpen = document.body.dataset.rightOpen !== "true";
          document.body.dataset.rightOpen = willOpen ? "true" : "false";
          document.body.dataset.leftOpen = "false";
        }
        if (action === "new-session") {
          showToast("这里会打开新会话创建流程。");
        }
        if (action === "copy-title") {
          const session = getActiveSession();
          const version = session.versions.find((item) => item.id === state.selectedVersionId) || session.versions[0];
          navigator.clipboard?.writeText(version.title);
          showToast("标题已复制");
        }
        if (action === "open-tab") {
          openRightPanel(actionTrigger.dataset.tab);
        }
      }

      const tabTrigger = event.target.closest("[data-tab]");
      if (tabTrigger && tabTrigger.parentElement === tabNavEl) {
        state.activeTab = tabTrigger.dataset.tab;
        render();
      }

      const versionTrigger = event.target.closest("[data-version-id]");
      if (versionTrigger) {
        state.selectedVersionId = versionTrigger.dataset.versionId;
        render();
      }

      const promptTrigger = event.target.closest("[data-prompt]");
      if (promptTrigger) {
        promptInputEl.value = promptTrigger.dataset.prompt;
        promptInputEl.focus();
      }
    });

    composerFormEl.addEventListener("submit", (event) => {
      event.preventDefault();
      const prompt = promptInputEl.value.trim();
      if (!prompt) return;
      const session = getActiveSession();
      appendMessage(session, {
        id: `user-${Date.now()}`,
        role: "user",
        author: "你",
        badge: "指令",
        time: "刚刚",
        avatar: "YOU",
        copy: prompt
      });
      promptInputEl.value = "";
      queueWriterRevision(session, prompt);
    });

    primaryActionEl.addEventListener("click", () => {
      runPrimaryAction();
    });

    scrimEl.addEventListener("click", () => {
      closeDrawers();
    });

    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeDrawers();
      }
    });

    render();
  </script>
</body>
</html>
